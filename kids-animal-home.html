<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>動物回家家</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #273043;
      --paper: #fff8e8;
      --sky: #8eddf5;
      --grass: #83df8f;
      --leaf: #36ad6a;
      --water: #55bfe8;
      --sun: #ffd75c;
      --pink: #ff8fab;
      --violet: #8b6cff;
      --orange: #ffb25c;
      --shadow: #31415a;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Courier New", Consolas, monospace;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.42) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.42) 75%),
        linear-gradient(45deg, rgba(255, 255, 255, 0.42) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.42) 75%),
        #ffe9a8;
      background-position: 0 0, 12px 12px;
      background-size: 24px 24px;
      image-rendering: pixelated;
      user-select: none;
    }

    button,
    canvas {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .game-shell {
      width: min(1040px, 100%);
      max-width: 100vw;
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto minmax(330px, 1fr) auto auto auto;
      gap: 12px;
    }

    .hud,
    .stage-wrap,
    .prompt-row,
    .collection-row,
    .home-row {
      max-width: 100%;
      border: 4px solid var(--ink);
      background: var(--paper);
      box-shadow: 0 6px 0 var(--shadow);
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #447567;
      font-size: 0.78rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      color: #ef6674;
      font-size: clamp(1.35rem, 4vw, 2.35rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 3px 3px 0 #ffd5de;
    }

    .score-box {
      min-width: 92px;
      padding: 8px 10px;
      display: grid;
      place-items: center;
      gap: 2px;
      border: 3px solid var(--ink);
      background: #dff9ff;
      box-shadow: inset 0 0 0 4px var(--white);
    }

    .score-box span {
      font-size: 0.78rem;
      font-weight: 700;
    }

    .score-box strong {
      color: var(--violet);
      font-size: 1.85rem;
      line-height: 1;
    }

    .stage-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 8px;
      background: #ffc1d2;
    }

    #gameCanvas {
      display: block;
      width: min(100%, 900px);
      min-width: 0;
      max-height: min(60vh, 640px);
      aspect-ratio: 900 / 640;
      border: 4px solid var(--ink);
      background: var(--sky);
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.62);
      image-rendering: pixelated;
      touch-action: none;
    }

    .prompt-row {
      min-height: 72px;
      display: grid;
      grid-template-columns: 56px 1fr;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
    }

    .animal-badge {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      background: var(--white);
      box-shadow: inset 0 0 0 4px #eaf9ff;
      font-size: 2rem;
      line-height: 1;
    }

    .message {
      margin: 0;
      font-size: clamp(1rem, 3.2vw, 1.42rem);
      font-weight: 700;
      line-height: 1.22;
    }

    .collection-row {
      min-height: 54px;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 6px;
      padding: 7px;
    }

    .stamp {
      min-height: 38px;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      background: #f1f4f8;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.9);
      font-size: 1.45rem;
      filter: grayscale(1);
      opacity: 0.55;
    }

    .stamp.done {
      background: #fff2a8;
      filter: none;
      opacity: 1;
    }

    .home-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .home-button,
    .reset-button {
      min-height: 78px;
      width: 100%;
      border: 4px solid var(--ink);
      border-radius: 0;
      color: var(--ink);
      background: var(--white);
      box-shadow: 0 6px 0 var(--shadow);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 100ms ease, box-shadow 100ms ease, filter 100ms ease;
    }

    .home-button span,
    .reset-button span {
      display: block;
      line-height: 1;
    }

    .home-button .icon {
      font-size: clamp(2rem, 8vw, 3.1rem);
    }

    .home-button .label,
    .reset-button .label {
      margin-top: 5px;
      font-size: clamp(0.78rem, 2.6vw, 1rem);
      font-weight: 700;
    }

    .home-button:focus-visible,
    .reset-button:focus-visible,
    .home-button:hover,
    .reset-button:hover {
      outline: none;
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .home-button:active,
    .reset-button:active,
    .home-button.pop,
    .reset-button.pop {
      transform: translateY(4px);
      box-shadow: 0 2px 0 var(--shadow);
    }

    .home-button.wrong {
      animation: wiggle 260ms steps(2, end);
    }

    .water-home {
      background: #85d8ff;
    }

    .tree-home {
      background: #99e986;
    }

    .house-home {
      background: #ffb778;
    }

    .burrow-home {
      background: #d6b088;
    }

    .dog-home {
      background: #ffd75c;
    }

    .reset-button {
      grid-column: 1 / -1;
      min-height: 58px;
      background: #d8c4ff;
    }

    .hidden {
      display: none;
    }

    @keyframes wiggle {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 620px) {
      .game-shell {
        grid-template-rows: auto minmax(230px, 42vh) auto auto auto;
        gap: 9px;
        padding-left: 9px;
        padding-right: 9px;
      }

      .hud,
      .stage-wrap,
      .prompt-row,
      .collection-row,
      .home-row {
        border-width: 3px;
        box-shadow: 0 4px 0 var(--shadow);
      }

      .hud {
        padding: 9px;
      }

      .score-box {
        min-width: 74px;
        padding: 6px 7px;
      }

      .score-box strong {
        font-size: 1.55rem;
      }

      #gameCanvas {
        max-height: 42vh;
        border-width: 3px;
      }

      .prompt-row {
        min-height: 64px;
        grid-template-columns: 48px 1fr;
        gap: 8px;
        padding: 7px 9px;
      }

      .animal-badge {
        width: 44px;
        height: 44px;
        font-size: 1.65rem;
      }

      .home-row {
        gap: 7px;
        padding: 8px;
      }

      .collection-row {
        min-height: 44px;
        gap: 4px;
        padding: 5px;
      }

      .stamp {
        min-height: 32px;
        border-width: 2px;
        font-size: 1.18rem;
      }

      .home-button {
        min-height: 64px;
        border-width: 3px;
        box-shadow: 0 4px 0 var(--shadow);
      }

      .reset-button {
        min-height: 48px;
        border-width: 3px;
        box-shadow: 0 4px 0 var(--shadow);
      }
    }

    @media (max-width: 430px) {
      .home-button .icon {
        font-size: 2.05rem;
      }

      .home-button .label,
      .reset-button .label {
        margin-top: 3px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-labelledby="gameTitle">
    <header class="hud">
      <div>
        <p class="eyebrow">PIXEL HOME</p>
        <h1 id="gameTitle">動物回家家</h1>
      </div>
      <div class="score-box" aria-live="polite">
        <span>星星</span>
        <strong id="starCount">0</strong>
      </div>
    </header>

    <section class="stage-wrap" aria-label="動物回家家遊戲畫面">
      <canvas id="gameCanvas" width="900" height="640" aria-label="可愛像素動物正在等你幫牠回家"></canvas>
    </section>

    <section class="prompt-row" aria-live="polite">
      <div id="animalBadge" class="animal-badge">🐟</div>
      <p id="message" class="message">幫小魚回家</p>
    </section>

    <section id="collectionRow" class="collection-row" aria-label="已回家的動物收藏"></section>

    <section class="home-row" aria-label="選擇動物的家">
      <button class="home-button water-home" type="button" data-home="pond" aria-label="水池">
        <span class="icon" aria-hidden="true">🌊</span>
        <span class="label">水池</span>
      </button>
      <button class="home-button tree-home" type="button" data-home="nest" aria-label="鳥窩">
        <span class="icon" aria-hidden="true">🌳</span>
        <span class="label">鳥窩</span>
      </button>
      <button class="home-button house-home" type="button" data-home="catHouse" aria-label="小屋">
        <span class="icon" aria-hidden="true">🏠</span>
        <span class="label">小屋</span>
      </button>
      <button class="home-button burrow-home" type="button" data-home="burrow" aria-label="草洞">
        <span class="icon" aria-hidden="true">🕳</span>
        <span class="label">草洞</span>
      </button>
      <button class="home-button dog-home" type="button" data-home="dogHouse" aria-label="狗屋">
        <span class="icon" aria-hidden="true">🦴</span>
        <span class="label">狗屋</span>
      </button>
      <button id="resetButton" class="reset-button" type="button" aria-label="重新開始">
        <span class="icon" aria-hidden="true">↻</span>
        <span class="label">再玩一次</span>
      </button>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#gameCanvas");
    const ctx = canvas.getContext("2d");
    const message = document.querySelector("#message");
    const animalBadge = document.querySelector("#animalBadge");
    const starCount = document.querySelector("#starCount");
    const collectionRow = document.querySelector("#collectionRow");
    const resetButton = document.querySelector("#resetButton");
    const homeButtons = Array.from(document.querySelectorAll("[data-home]"));

    const WIDTH = 900;
    const HEIGHT = 640;
    const animals = [
      { id: "fish", name: "小魚", icon: "🐟", home: "pond", prompt: "幫小魚回家", hint: "小魚喜歡水池", greet: "噗噗，小魚吐泡泡", color: "#49bfd3" },
      { id: "bird", name: "小鳥", icon: "🐦", home: "nest", prompt: "幫小鳥回家", hint: "小鳥住在鳥窩", greet: "拍拍，小鳥揮翅膀", color: "#ffd75c" },
      { id: "cat", name: "小貓", icon: "🐱", home: "catHouse", prompt: "幫小貓回家", hint: "小貓想回小屋", greet: "喵喵，小貓搖尾巴", color: "#ffb778" },
      { id: "rabbit", name: "小兔", icon: "🐰", home: "burrow", prompt: "幫小兔回家", hint: "小兔跳進草洞", greet: "跳跳，小兔蹦一下", color: "#ffffff" },
      { id: "dog", name: "小狗", icon: "🐶", home: "dogHouse", prompt: "幫小狗回家", hint: "小狗找狗屋", greet: "汪汪，小狗轉圈圈", color: "#c78343" },
      { id: "turtle", name: "小龜", icon: "🐢", home: "pond", prompt: "幫小龜回家", hint: "小龜慢慢去水池", greet: "慢慢，小龜伸伸頭", color: "#65c96b" },
      { id: "squirrel", name: "松鼠", icon: "🐿", home: "nest", prompt: "幫松鼠回家", hint: "松鼠爬上大樹", greet: "咔咔，松鼠抱果果", color: "#b98652" },
      { id: "hamster", name: "倉鼠", icon: "🐹", home: "burrow", prompt: "幫倉鼠回家", hint: "倉鼠鑽進草洞", greet: "嚕嚕，倉鼠鼓鼓臉", color: "#e8bd78" }
    ];

    const homeMeta = {
      pond: { x: 112, y: 528, label: "水池", color: "#55bfe8" },
      nest: { x: 766, y: 202, label: "鳥窩", color: "#36ad6a" },
      catHouse: { x: 790, y: 528, label: "小屋", color: "#ffb778" },
      burrow: { x: 282, y: 568, label: "草洞", color: "#b98652" },
      dogHouse: { x: 584, y: 568, label: "狗屋", color: "#ffd75c" }
    };

    const hideSpots = [
      { x: 154, y: 416, kind: "bush" },
      { x: 766, y: 196, kind: "tree" },
      { x: 790, y: 426, kind: "box" },
      { x: 282, y: 504, kind: "grass" },
      { x: 584, y: 500, kind: "bone" },
      { x: 112, y: 502, kind: "pond" },
      { x: 766, y: 196, kind: "tree" },
      { x: 282, y: 538, kind: "grass" }
    ];

    const obstacleSpots = [
      { x: 438, y: 418, kind: "leaf" },
      { x: 536, y: 388, kind: "branch" },
      { x: 612, y: 454, kind: "stone" },
      { x: 382, y: 496, kind: "leaf" },
      { x: 512, y: 512, kind: "stone" },
      { x: 330, y: 470, kind: "puddle" },
      { x: 560, y: 382, kind: "branch" },
      { x: 410, y: 520, kind: "leaf" }
    ];

    let state = {
      index: 0,
      stars: 0,
      animalX: 450,
      animalY: 268,
      targetX: 450,
      targetY: 288,
      mood: "waiting",
      phase: "find",
      celebrate: 0,
      wrongShake: 0,
      tapBounce: 0,
      moveTimer: null,
      particles: [],
      lightGlow: null,
      completed: [],
      audioReady: false,
      audioContext: null
    };

    function currentAnimal() {
      return animals[state.index];
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function showCurrentPrompt() {
      const animal = currentAnimal();
      animalBadge.textContent = animal.icon;
      if (state.phase === "find") {
        message.textContent = `找找${animal.name}在哪裡`;
        return;
      }
      if (state.phase === "clear") {
        message.textContent = "點一點，把小路清乾淨";
        return;
      }
      if (state.phase === "light") {
        message.textContent = "點亮發光的小燈";
        return;
      }
      message.textContent = animal.prompt;
    }

    function renderCollection() {
      collectionRow.innerHTML = animals.map((animal, index) => {
        const done = state.completed.includes(index) ? " done" : "";
        return `<span class="stamp${done}" aria-label="${animal.name}${done ? "已回家" : "還在等"}">${animal.icon}</span>`;
      }).join("");
    }

    function resetRoundPosition() {
      state.animalX = 450;
      state.animalY = 268;
      state.targetX = 450;
      state.targetY = 288;
      state.mood = "waiting";
      state.phase = "find";
      state.wrongShake = 0;
      state.lightGlow = null;
      if (state.moveTimer) {
        window.clearTimeout(state.moveTimer);
        state.moveTimer = null;
      }
    }

    function resetGame() {
      state.index = 0;
      state.stars = 0;
      state.celebrate = 0;
      state.particles = [];
      state.lightGlow = null;
      state.completed = [];
      starCount.textContent = "0";
      renderCollection();
      resetRoundPosition();
      showCurrentPrompt();
    }

    function initAudio() {
      if (state.audioReady) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      state.audioContext = new AudioContext();
      state.audioReady = true;
    }

    function playTone(happy = true) {
      initAudio();
      if (!state.audioContext) return;
      const audioTime = state.audioContext.currentTime;
      const oscillator = state.audioContext.createOscillator();
      const gain = state.audioContext.createGain();
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(happy ? 620 : 220, audioTime);
      oscillator.frequency.exponentialRampToValueAtTime(happy ? 930 : 180, audioTime + 0.16);
      gain.gain.setValueAtTime(0.07, audioTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioTime + 0.22);
      oscillator.connect(gain);
      gain.connect(state.audioContext.destination);
      oscillator.start(audioTime);
      oscillator.stop(audioTime + 0.24);
    }

    function spawnParticles(count, color, x = state.animalX, y = state.animalY) {
      for (let i = 0; i < count; i += 1) {
        state.particles.push({
          x: randomBetween(x - 50, x + 50),
          y: randomBetween(y - 46, y + 40),
          vx: randomBetween(-2.1, 2.1),
          vy: randomBetween(-2.7, -0.5),
          life: randomBetween(28, 58),
          color
        });
      }
    }

    function chooseHome(home, button) {
      if (state.mood === "moving" || state.mood === "done") return;
      const animal = currentAnimal();
      button.classList.add("pop");
      window.setTimeout(() => button.classList.remove("pop"), 130);

      if (state.phase !== "choose") {
        message.textContent = state.phase === "find" ? `先找找${animal.name}` : state.phase === "light" ? "先點亮小燈" : "先把小路清乾淨";
        playTone(false);
        window.setTimeout(showCurrentPrompt, 760);
        return;
      }

      if (home !== animal.home) {
        button.classList.add("wrong");
        window.setTimeout(() => button.classList.remove("wrong"), 280);
        state.wrongShake = 16;
        message.textContent = animal.hint;
        playTone(false);
        spawnParticles(6, "#fff8e8");
        window.setTimeout(showCurrentPrompt, 760);
        return;
      }

      const target = homeMeta[home];
      state.targetX = target.x;
      state.targetY = target.y - 36;
      state.mood = "moving";
      message.textContent = `${animal.name}回家囉`;
      playTone(true);
      spawnParticles(14, "#ffd75c");
      state.moveTimer = window.setTimeout(() => {
        if (state.mood !== "moving") return;
        state.animalX = state.targetX;
        state.animalY = state.targetY;
        arriveHome();
      }, 1150);
    }

    function arriveHome() {
      if (state.moveTimer) {
        window.clearTimeout(state.moveTimer);
        state.moveTimer = null;
      }
      const animal = currentAnimal();
      state.mood = "waiting";
      state.phase = "light";
      state.celebrate = 28;
      message.textContent = `${animal.name}到家了`;
      spawnParticles(20, animal.color, state.targetX, state.targetY);
      window.setTimeout(showCurrentPrompt, 620);
    }

    function finishAnimal() {
      const animal = currentAnimal();
      if (state.moveTimer) {
        window.clearTimeout(state.moveTimer);
        state.moveTimer = null;
      }
      state.stars += 1;
      starCount.textContent = String(state.stars);
      state.completed.push(state.index);
      renderCollection();
      state.celebrate = 58;
      state.mood = "done";
      spawnParticles(34, "#ffd75c", state.targetX, state.targetY);
      spawnParticles(18, animal.color, state.targetX, state.targetY);

      window.setTimeout(() => {
        state.index += 1;
        if (state.index >= animals.length) {
          state.index = 0;
          state.mood = "complete";
          animalBadge.textContent = "⭐";
          message.textContent = "大家都回家了，星星滿滿";
          state.celebrate = 120;
          return;
        }

        resetRoundPosition();
        showCurrentPrompt();
      }, 520);
    }

    function canvasPoint(event) {
      const pointer = event.changedTouches ? event.changedTouches[0] : event;
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((pointer.clientX - rect.left) / rect.width) * WIDTH,
        y: ((pointer.clientY - rect.top) / rect.height) * HEIGHT
      };
    }

    function tapAnimal(event) {
      const point = canvasPoint(event);
      const animal = currentAnimal();

      if (state.mood !== "waiting" || state.mood === "complete") return;

      if (state.phase === "find") {
        const spot = hideSpots[state.index];
        if (Math.abs(point.x - spot.x) > 62 || Math.abs(point.y - spot.y) > 62) {
          message.textContent = "點亮亮的地方找找看";
          window.setTimeout(showCurrentPrompt, 640);
          return;
        }

        state.phase = "clear";
        state.tapBounce = 24;
        message.textContent = `${animal.name}找到囉`;
        playTone(true);
        spawnParticles(18, animal.color, spot.x, spot.y);
        window.setTimeout(showCurrentPrompt, 760);
        return;
      }

      if (state.phase === "clear") {
        const obstacle = obstacleSpots[state.index];
        if (Math.abs(point.x - obstacle.x) > 66 || Math.abs(point.y - obstacle.y) > 58) {
          message.textContent = "點路上的小東西";
          window.setTimeout(showCurrentPrompt, 640);
          return;
        }

        state.phase = "choose";
        message.textContent = "小路乾淨了，選牠的家";
        playTone(true);
        spawnParticles(18, "#83df8f", obstacle.x, obstacle.y);
        window.setTimeout(showCurrentPrompt, 760);
        return;
      }

      if (state.phase === "light") {
        const target = homeMeta[animal.home];
        const lampY = target.y - 94;
        const tappedHome = Math.abs(point.x - target.x) <= 92 && Math.abs(point.y - target.y) <= 82;

      drawRect(x + 14, y + 36, 12, 24, "#8b5a38");
      drawRect(x - 30, y + 56, 24, 8, "#8b5a38");
      drawRect(x + 8, y + 56, 24, 8, "#8b5a38");
    }

    function drawCat(x, y, time) {
      const tail = Math.sin(time / 180) * 12;
      drawRect(x - 54, y - 36, 108, 72, "#273043");
      drawRect(x - 42, y - 50, 84, 94, "#273043");
      drawRect(x - 50, y - 30, 100, 60, "#ffb778");
      drawRect(x - 38, y - 44, 76, 82, "#ffb778");
      drawOutlinedRect(x - 64, y - 68, 30, 38, "#ffb778");
      drawOutlinedRect(x + 34, y - 68, 30, 38, "#ffb778");
      drawRect(x - 56, y - 58, 12, 18, "#ff8fab");
      drawRect(x + 44, y - 58, 12, 18, "#ff8fab");
      drawOutlinedRect(x + 42, y + 14 + tail * 0.2, 58, 22, "#ffb778");
      drawRect(x - 28, y - 34, 18, 12, "#ffd75c");
      drawRect(x + 12, y - 34, 18, 12, "#ffd75c");
      drawEye(x - 24, y - 14);
      drawEye(x + 12, y - 14);
      drawRect(x - 5, y + 2, 10, 8, "#273043");
      drawTinySmile(x, y + 18);
      drawCheeks(x, y - 2);
      drawRect(x - 42, y + 6, 28, 5, "#273043");
      drawRect(x + 14, y + 6, 28, 5, "#273043");
    }

    function drawRabbit(x, y, time) {
      const hop = Math.abs(Math.sin(time / 180)) * 8;
      const yy = y - hop;
      drawRect(x - 52, yy - 20, 104, 60, "#273043");
      drawRect(x - 38, yy - 38, 76, 92, "#273043");
      drawRect(x - 48, yy - 14, 96, 48, "#ffffff");
      drawRect(x - 34, yy - 32, 68, 80, "#ffffff");
      drawOutlinedRect(x - 48, yy - 92, 28, 70, "#ffffff");
      drawOutlinedRect(x + 20, yy - 92, 28, 70, "#ffffff");
      drawRect(x - 40, yy - 76, 12, 42, "#ffb7c7");
      drawRect(x + 28, yy - 76, 12, 42, "#ffb7c7");
      drawRect(x - 24, yy - 24, 48, 18, "#eaf9ff");
      drawEye(x - 24, yy - 10);
      drawEye(x + 12, yy - 10);
      drawRect(x - 5, yy + 5, 10, 8, "#273043");
      drawTinySmile(x, yy + 20);
      drawCheeks(x, yy);
      drawOutlinedRect(x - 62, yy + 30, 32, 20, "#ffffff");
      drawOutlinedRect(x + 30, yy + 30, 32, 20, "#ffffff");
    }

    function drawDog(x, y, time) {
      const spin = Math.sin(time / 150) * 6;
      drawRect(x - 58, y - 34, 116, 72, "#273043");
      drawRect(x - 44, y - 48, 88, 98, "#273043");
      drawRect(x - 54, y - 28, 108, 60, "#c78343");
      drawRect(x - 40, y - 42, 80, 86, "#c78343");
      drawOutlinedRect(x - 78, y - 34, 34, 58, "#8b5a38");
      drawOutlinedRect(x + 44, y - 34, 34, 58, "#8b5a38");
      drawOutlinedRect(x - 22, y - 2, 44, 28, "#fff8e8");
      drawOutlinedRect(x + 48, y + 22 + spin, 62, 18, "#c78343");
      drawRect(x - 28, y - 36, 18, 12, "#ffd75c");
      drawEye(x - 24, y - 16);
      drawEye(x + 12, y - 16);
      drawRect(x - 6, y - 1, 12, 10, "#273043");
      drawTinySmile(x, y + 20);
      drawCheeks(x, y - 4, "#e8bd78");
    }

    function drawTurtle(x, y, time) {
      const head = Math.sin(time / 220) * 8;
      drawRect(x - 68, y - 22, 132, 52, "#273043");
      drawRect(x - 54, y - 36, 104, 78, "#273043");
      drawRect(x - 64, y - 16, 124, 40, "#65c96b");
      drawRect(x - 50, y - 30, 96, 66, "#65c96b");
      drawOutlinedRect(x - 44, y - 48, 88, 62, "#2f9b60");
      drawRect(x - 30, y - 36, 24, 18, "#83df8f");
      drawRect(x + 4, y - 36, 24, 18, "#83df8f");
      drawRect(x - 22, y - 12, 44, 20, "#ffd75c");
      drawOutlinedRect(x + 46 + head, y - 20, 48, 40, "#83df8f");
      drawEye(x + 60 + head, y - 10);
      drawTinySmile(x + 72 + head, y + 10);
      drawOutlinedRect(x - 68, y + 28, 28, 18, "#2f9b60");
      drawOutlinedRect(x + 36, y + 28, 28, 18, "#2f9b60");
    }

    function drawSquirrel(x, y, time) {
      const tail = Math.sin(time / 170) * 8;
      drawRect(x - 46, y - 30, 92, 66, "#273043");
      drawRect(x - 34, y - 44, 68, 92, "#273043");
      drawRect(x - 42, y - 24, 84, 54, "#b98652");
      drawRect(x - 30, y - 38, 60, 80, "#b98652");
      drawOutlinedRect(x + 34, y - 74 + tail, 50, 100, "#d69a5c");
      drawRect(x + 48, y - 60 + tail, 22, 68, "#fff2a8");
      drawOutlinedRect(x - 38, y - 64, 24, 34, "#b98652");
      drawOutlinedRect(x + 14, y - 64, 24, 34, "#b98652");
      drawRect(x - 28, y - 20, 56, 18, "#d69a5c");
      drawEye(x - 24, y - 14);
      drawEye(x + 12, y - 14);
      drawTinySmile(x, y + 15);
      drawCheeks(x, y - 3, "#e8bd78");
      drawOutlinedRect(x - 18, y + 16, 36, 28, "#ffd75c");
      drawRect(x - 10, y + 24, 20, 8, "#8b5a38");
    }

    function drawHamster(x, y, time) {
      const cheek = Math.sin(time / 230) > 0 ? 2 : 0;
      drawRect(x - 58, y - 34, 116, 74, "#273043");
      drawRect(x - 42, y - 50, 84, 104, "#273043");
      drawRect(x - 54, y - 28, 108, 62, "#e8bd78");
      drawRect(x - 38, y - 44, 76, 92, "#e8bd78");
      drawOutlinedRect(x - 62, y - 64, 32, 38, "#e8bd78");
      drawOutlinedRect(x + 30, y - 64, 32, 38, "#e8bd78");
      drawRect(x - 54, y - 22, 24, 18, "#fff2c2");
      drawRect(x + 30, y - 22, 24, 18, "#fff2c2");
      drawOutlinedRect(x - 46, y - 6, 30 + cheek, 28, "#fff2c2");
      drawOutlinedRect(x + 16, y - 6, 30 + cheek, 28, "#fff2c2");
      drawEye(x - 24, y - 16);
      drawEye(x + 12, y - 16);
      drawRect(x - 5, y + 2, 10, 8, "#273043");
      drawTinySmile(x, y + 20);
      drawOutlinedRect(x - 20, y + 28, 16, 18, "#b98652");
      drawOutlinedRect(x + 4, y + 28, 16, 18, "#b98652");
    }

    function drawAllAnimals(time) {
      drawRect(150, 144, 600, 302, "rgba(39,48,67,0.72)");
      drawRect(164, 158, 572, 274, "rgba(255,255,255,0.94)");
      drawRect(180, 174, 540, 242, "rgba(216,249,255,0.72)");
      drawRect(198, 332, 504, 64, "rgba(131,223,143,0.7)");
      drawRect(220, 360, 460, 18, "rgba(39,48,67,0.12)");

      ctx.save();
      ctx.translate(228, 274);
      ctx.scale(0.58, 0.58);
      ctx.translate(-228, -274);
      drawFish(228, 274, time);
      ctx.restore();

      ctx.save();
      ctx.translate(378, 268);
      ctx.scale(0.58, 0.58);
      ctx.translate(-378, -268);
      drawBird(378, 268, time);
      ctx.restore();

      ctx.save();
      ctx.translate(522, 274);
      ctx.scale(0.58, 0.58);
      ctx.translate(-522, -274);
      drawCat(522, 274, time);
      ctx.restore();

      ctx.save();
      ctx.translate(668, 274);
      ctx.scale(0.55, 0.55);
      ctx.translate(-668, -274);
      drawRabbit(668, 274, time);
      ctx.restore();

      ctx.save();
      ctx.translate(228, 370);
      ctx.scale(0.58, 0.58);
      ctx.translate(-228, -370);
      drawTurtle(228, 370, time);
      ctx.restore();

      ctx.save();
      ctx.translate(378, 372);
      ctx.scale(0.58, 0.58);
      ctx.translate(-378, -372);
      drawDog(378, 372, time);
      ctx.restore();

      ctx.save();
      ctx.translate(522, 370);
      ctx.scale(0.56, 0.56);
      ctx.translate(-522, -370);
      drawSquirrel(522, 370, time);
      ctx.restore();

      ctx.save();
      ctx.translate(668, 372);
      ctx.scale(0.58, 0.58);
      ctx.translate(-668, -372);
      drawHamster(668, 372, time);
      ctx.restore();

      drawPixelText("大家都回家了", 450, 78, 36, "#273043");
      drawPixelText("8 顆星星", 450, 122, 28, "#8b6cff");
    }

    function drawParticles() {
      state.particles = state.particles.filter((particle) => particle.life > 0);
      state.particles.forEach((particle) => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.08;
        particle.life -= 1;
        drawRect(particle.x, particle.y, 10, 10, particle.color);
        drawRect(particle.x + 3, particle.y - 5, 4, 20, particle.color);
      });
    }

    function updateMovement() {
      if (state.mood !== "moving") return;
      state.animalX += (state.targetX - state.animalX) * 0.12;
      state.animalY += (state.targetY - state.animalY) * 0.12;
      if (Math.abs(state.targetX - state.animalX) < 3 && Math.abs(state.targetY - state.animalY) < 3) {
        state.animalX = state.targetX;
        state.animalY = state.targetY;
        arriveHome();
      }
    }

    function drawScene(time = 0) {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      drawWorld();
      drawHomeLanterns(time);
      drawHideSpot(time);
      drawObstacle(time);
      drawHomeLight(time);
      drawLitGlow();
      drawCharacterStage(time);
      drawAnimal(time);
      drawParticles();

      if (state.celebrate > 0) {
        state.celebrate -= 1;
        if (state.celebrate % 13 === 0) spawnParticles(3, "#ffd75c", randomBetween(110, 790), randomBetween(70, 310));
      }

      if (state.wrongShake > 0) state.wrongShake -= 1;
      if (state.tapBounce > 0) state.tapBounce -= 1;
      updateMovement();
      requestAnimationFrame(drawScene);
    }

    function resizeCanvas() {
      const pixelRatio = window.devicePixelRatio || 1;
      canvas.width = WIDTH * pixelRatio;
      canvas.height = HEIGHT * pixelRatio;
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }

    function bindPress(element, handler) {
      let lastPressTime = 0;
      const run = (event) => {
        const now = Date.now();
        if (now - lastPressTime < 260) return;
        lastPressTime = now;
        event.preventDefault();
        handler(event);
      };

      if (window.PointerEvent) {
        element.addEventListener("pointerup", run);
        return;
      }

      element.addEventListener("touchend", run, { passive: false });
      element.addEventListener("click", run);
    }

    homeButtons.forEach((button) => {
      bindPress(button, () => chooseHome(button.dataset.home, button));
    });

    bindPress(canvas, tapAnimal);

    bindPress(resetButton, () => {
      resetButton.classList.add("pop");
      window.setTimeout(() => resetButton.classList.remove("pop"), 130);
      resetGame();
      message.textContent = "再幫動物回家";
      spawnParticles(18, "#d8c4ff", 360, 240);
      window.setTimeout(showCurrentPrompt, 720);
    });

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    resetGame();
    requestAnimationFrame(drawScene);
  </script>
</body>
</html>
